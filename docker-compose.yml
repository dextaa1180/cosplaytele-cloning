services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: cosplaytele-cloning:latest
    container_name: cosplaytele-cloning
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: cosplaytele-cloning:dev
    container_name: cosplaytele-cloning-dev
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:${DEV_PORT:-3001}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
